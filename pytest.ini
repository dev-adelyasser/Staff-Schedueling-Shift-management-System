[pytest]
# ── Test discovery ────────────────────────────────────────────
testpaths = tests e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Async mode ────────────────────────────────────────────────
asyncio_mode = auto

# ── Markers (Testing Pyramid) ─────────────────────────────────
markers =
    unit:        Unit tests – pure functions, no I/O  (70%% target)
    integration: Integration tests – real DB session  (20%% target)
    e2e:         End-to-end tests – Playwright / HTTP (10%% target)
    padlock:     Tests that exercise Padlock validators

# ── Coverage thresholds ───────────────────────────────────────
addopts =
    --strict-markers
    -v
    --tb=short

# ── Warnings ─────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
