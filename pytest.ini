# pytest.ini — root-level pytest configuration
# ──────────────────────────────────────────────
# Placed at the project root so pytest discovers tests/ and e2e/ regardless
# of which directory the developer invokes pytest from.
#
# asyncio_mode = auto
#   Required by pytest-asyncio 0.23.x.  Without this flag every async test
#   must carry an explicit @pytest.mark.asyncio decorator AND the old
#   "strict" mode emits deprecation warnings that pollute CI output.
#   Setting it here makes async functions first-class test citizens.
#
# --cov target
#   backend/app is the coverage target; tests/ is excluded so the percentage
#   reflects only production code — keeping the 70/20/10 ratio honest.

[pytest]
asyncio_mode = auto

testpaths =
    tests

python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum coverage gate — CI fails if we fall below 80 % overall.
# Adjust per-phase as the codebase grows.
addopts =
    --cov=backend/app
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=0
    -v

# Silence noisy third-party deprecation warnings that are not our concern.
filterwarnings =
    ignore::DeprecationWarning:passlib.*:
    ignore::DeprecationWarning:jose.*:
